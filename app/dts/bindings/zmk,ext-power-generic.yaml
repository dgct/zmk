description: |
  Generic driver for controlling the external power output
  by toggling the control-gpio pin status
  (Only in supported hardware)

compatible: "zmk,ext-power-generic"

properties:
  control-gpios:
    type: phandle-array
    required: true
  label:
    type: string
    required: false
    deprecated: true
  init-delay-ms:
    type: int
    description: Number of milliseconds to delay after initializing driver
    required: false
  init-off-delay-ms:
    type: int
    description: |
      Number of milliseconds to hold external power off during driver
      initialization before re-enabling. Useful for peripherals (e.g.
      trackpoints) with hardware power-on-reset circuits that need VCC
      to remain low long enough for the reset capacitor to discharge.
    required: false
