manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: dgct
      url-base: https://github.com/dgct
  projects:
    - name: zephyr
      remote: dgct
      # v4.1.0+zmk-fixes + ls0xx VCOM sem/SPI release fix (display freeze)
      # + P8: [backport] BT_ATT_SENT_CB_AFTER_TX (true OTA-confirmed
      # ATT TX completion callback, ~20 LOC across att.c/l2cap.c/conn.c/
      # Kconfig.gatt; opt-in via CONFIG_BT_ATT_SENT_CB_AFTER_TX=y).
      # + P8 fix: release extra buf ref on L2CAP queue drain at disconnect
      #   (prevents net_buf pool leak across BT profile switches).
      revision: d9661ee2
      clone-depth: 1
      import:
        name-blocklist:
          - ci-tools
          - hal_altera
          - hal_cypress
          - hal_infineon
          - hal_microchip
          - hal_nxp
          - hal_openisa
          - hal_xtensa
          - hal_st
          - hal_ti
          - loramac-node
          - mcuboot
          - mcumgr
          - net-tools
          - openthread
          - edtt
          - trusted-firmware-m
    - name: hal_stm32
      revision: 4fcc3a3f32abe1c4cb76d9d1cef967728dd03908
      path: modules/hal/stm32
      remote: zmkfirmware
      groups:
        - hal
    - name: lvgl
      revision: f1db87ee98f1810328a8419572fa42a3b5f352ae
      path: modules/lib/gui/lvgl
      remote: zmkfirmware
    - name: zmk-studio-messages
      revision: 6cb4c283e76209d59c45fbcb218800cd19e9339d
      path: modules/msgs/zmk-studio-messages
      remote: zmkfirmware
  group-filter: [+optional]
  self:
    west-commands: scripts/west-commands.yml
